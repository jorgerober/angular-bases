<h3>Listado de Heroes</h3>

<div *ngIf="deleteHero; else nothingWasDelete" >
  <h3>heroe borrado <small class="text-danger">{{deleteHero}}</small></h3>
</div>

<ng-template #nothingWasDelete>
  <h3>no ha borrado nada</h3>
</ng-template>


<button
*ngIf="heroNames.length > 0"
class="btn btn-outline-danger mx-2"
(click)="removeHero()">
Borrar Heroe
</button>

<button class="btn  btn-outline-warning">editar</button>
<ul class="mt-2 list-group">
  <li *ngFor="let name of heroNames"
    class="list-group-item">
    {{name}}
  </li>
</ul>
